<section id="booking-embed" class="section" style="background:#f4f7ff;margin-top:0;padding-top:1em;padding-bottom:1.5em;">
  <div class="container">
    <div class="padding">
      <div style="text-align:center;margin-bottom:2.5em;">
        <h2 class="heading is-extra-large-title" style="color:#004aad;">Book your visit</h2>
        <p class="paragraph is-large" style="margin-top:.75em;max-width:38em;margin-left:auto;margin-right:auto;">Choose the type of meeting and book your spot right here — no need to email.</p>
      </div>

      <!-- Tab switcher -->
      <div style="display:flex;justify-content:center;gap:1em;margin-bottom:2em;flex-wrap:wrap;">
        <button id="tab-dod" onclick="switchCal('dod')" style="
          padding:1em 2.4em;border-radius:50em;border:2px solid #e8950a;
          background:linear-gradient(135deg,#f5c748,#e8950a);color:#2b0804;font-size:1.2em;font-weight:700;
          cursor:pointer;transition:all .18s;font-family:inherit;">
          Open Day
        </button>
        <button id="tab-kafe" onclick="switchCal('kafe')" style="
          padding:1em 2.4em;border-radius:50em;border:2px solid #e8950a;
          background:#fff;color:#a06500;font-size:1.2em;font-weight:700;
          cursor:pointer;transition:all .18s;font-family:inherit;">
          Coffee with the Principal
        </button>
        <button id="tab-online" onclick="switchCal('online')" style="
          padding:1em 2.4em;border-radius:50em;border:2px solid #e8950a;
          background:#fff;color:#a06500;font-size:1.2em;font-weight:700;
          cursor:pointer;transition:all .18s;font-family:inherit;">
          Online meeting
        </button>
      </div>

      <!-- DOD calendar -->
      <div id="cal-dod" class="calendly-inline-widget"
           data-url="https://calendly.com/skolaflowcz/zs-flow-den-otevrenych-dveri-2025-26?hide_landing_page_details=1&hide_gdpr_banner=1&primary_color=004aad"
           style="min-width:320px;height:580px;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,74,173,0.12);">
      </div>

      <!-- Kafe calendar (hidden by default) -->
      <div id="cal-kafe" class="calendly-inline-widget"
           data-url="https://calendly.com/skolaflowcz/kafe-s-ridou?hide_landing_page_details=1&hide_gdpr_banner=1&primary_color=004aad"
           style="min-width:320px;height:580px;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,74,173,0.12);display:none;">
      </div>

      <!-- Online meeting calendar (hidden by default) -->
      <div id="cal-online" class="calendly-inline-widget"
           data-url="https://calendly.com/skolaflowcz/call-w-marv-shamma?hide_landing_page_details=1&hide_gdpr_banner=1&primary_color=004aad"
           style="min-width:320px;height:580px;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,74,173,0.12);display:none;">
      </div>

      <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
      <script>
        var ACTIVE_STYLE = 'linear-gradient(135deg,#f5c748,#e8950a)';
        var INACTIVE_STYLE = '#fff';
        var ACTIVE_COLOR = '#2b0804';
        var INACTIVE_COLOR = '#a06500';

        function switchCal(which) {
          var tabs = {dod: 'tab-dod', kafe: 'tab-kafe', online: 'tab-online'};
          var cals = {dod: 'cal-dod', kafe: 'cal-kafe', online: 'cal-online'};
          Object.keys(tabs).forEach(function(key) {
            var tab = document.getElementById(tabs[key]);
            var cal = document.getElementById(cals[key]);
            if (key === which) {
              tab.style.background = ACTIVE_STYLE; tab.style.color = ACTIVE_COLOR;
              cal.style.display = '';
            } else {
              tab.style.background = INACTIVE_STYLE; tab.style.color = INACTIVE_COLOR;
              cal.style.display = 'none';
            }
          });
        }

        // Auto-switch to tab based on URL hash (e.g. #cal-online)
        (function() {
          var hash = window.location.hash.replace('#', '');
          if (hash === 'cal-kafe') switchCal('kafe');
          else if (hash === 'cal-online') switchCal('online');
          else switchCal('dod');
        })();
      </script>
    </div>
  </div>
</section>
