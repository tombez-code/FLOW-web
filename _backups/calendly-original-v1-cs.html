<section class="section" style="background:#f4f7ff;margin-top:0;padding-top:5em;padding-bottom:5em;">
  <div class="container">
    <div class="padding">
      <div style="text-align:center;margin-bottom:2.5em;">
        <div class="title-badge" style="display:inline-flex;margin-bottom:1em;"><div class="title-badge-text">Rezervace</div></div>
        <h2 class="heading is-extra-large-title is-blue">Rezervujte si termín</h2>
        <p class="paragraph is-large" style="margin-top:.75em;max-width:38em;margin-left:auto;margin-right:auto;">Vyberte si typ setkání a rezervujte si místo přímo zde — bez nutnosti psát e-mail.</p>
      </div>

      <!-- Tab switcher -->
      <div style="display:flex;justify-content:center;gap:1em;margin-bottom:2em;">
        <button id="tab-dod" onclick="switchCal('dod')" style="
          padding:.75em 2em;border-radius:50em;border:2px solid #004aad;
          background:#004aad;color:#fff;font-size:1.05em;font-weight:700;
          cursor:pointer;transition:all .18s;font-family:inherit;">
          Den otevřených dveří
        </button>
        <button id="tab-kafe" onclick="switchCal('kafe')" style="
          padding:.75em 2em;border-radius:50em;border:2px solid #004aad;
          background:#fff;color:#004aad;font-size:1.05em;font-weight:700;
          cursor:pointer;transition:all .18s;font-family:inherit;">
          Káva s Řídou
        </button>
      </div>

      <!-- DOD calendar -->
      <div id="cal-dod" class="calendly-inline-widget"
           data-url="https://calendly.com/skolaflowcz/zs-flow-den-otevrenych-dveri-2025-26?hide_landing_page_details=1&hide_gdpr_banner=1&primary_color=004aad"
           style="min-width:320px;height:700px;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,74,173,0.12);">
      </div>

      <!-- Káva s Řídou calendar (hidden by default) -->
      <div id="cal-kafe" class="calendly-inline-widget"
           data-url="https://calendly.com/skolaflowcz/kafe-s-ridou?hide_landing_page_details=1&hide_gdpr_banner=1&primary_color=004aad"
           style="min-width:320px;height:700px;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,74,173,0.12);display:none;">
      </div>

      <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
      <script>
        function switchCal(which) {
          var dod  = document.getElementById('cal-dod');
          var kafe = document.getElementById('cal-kafe');
          var tabDod  = document.getElementById('tab-dod');
          var tabKafe = document.getElementById('tab-kafe');
          if (which === 'dod') {
            dod.style.display  = '';
            kafe.style.display = 'none';
            tabDod.style.background  = '#004aad'; tabDod.style.color  = '#fff';
            tabKafe.style.background = '#fff';    tabKafe.style.color = '#004aad';
          } else {
            dod.style.display  = 'none';
            kafe.style.display = '';
            tabKafe.style.background = '#004aad'; tabKafe.style.color = '#fff';
            tabDod.style.background  = '#fff';    tabDod.style.color  = '#004aad';
          }
        }
      </script>
    </div>
  </div>
</section>
